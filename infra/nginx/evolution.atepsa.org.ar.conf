# evolution.atepsa.org.ar — Evolution API (Fase 1, puerto 8081 en localhost)
# Instalar: cp este archivo a /etc/nginx/conf.d/ y ejecutar certbot

server {
    listen 80;
    server_name evolution.atepsa.org.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name evolution.atepsa.org.ar;

    ssl_certificate     /etc/letsencrypt/live/evolution.atepsa.org.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evolution.atepsa.org.ar/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Evolution API maneja archivos de WhatsApp (audios, imágenes)
    client_max_body_size 100M;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
