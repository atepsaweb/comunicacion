# n8n.atepsa.org.ar — n8n (Fase 1, puerto 5678 en localhost)
# Instalar: cp este archivo a /etc/nginx/conf.d/ y ejecutar certbot

server {
    listen 80;
    server_name n8n.atepsa.org.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name n8n.atepsa.org.ar;

    ssl_certificate     /etc/letsencrypt/live/n8n.atepsa.org.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.atepsa.org.ar/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # n8n necesita websockets y payloads más grandes (webhooks de WhatsApp)
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
