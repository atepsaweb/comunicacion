# panel.atepsa.org.ar — Next.js (Fase 2, puerto 3001 en localhost)
# Instalar: cp este archivo a /etc/nginx/conf.d/ y ejecutar certbot

server {
    listen 80;
    server_name panel.atepsa.org.ar;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name panel.atepsa.org.ar;

    # Certs generados por: certbot --nginx -d panel.atepsa.org.ar
    ssl_certificate     /etc/letsencrypt/live/panel.atepsa.org.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.atepsa.org.ar/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
