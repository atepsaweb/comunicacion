services:

  # ─── Base de datos (sin puerto expuesto al host — solo red interna Docker) ────
  postgres:
    image: postgres:16-alpine
    container_name: atepsa-rep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - atepsa-rep
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── WhatsApp bot (WPPConnect Server — Puppeteer/Chrome, no Baileys) ──────────
  # Usa un Chrome real para conectar a WhatsApp Web → mucho menos detectable
  # que Baileys (que reimplementa el protocolo de cero).
  wppconnect:
    image: wppconnect/wppconnect-server:latest
    container_name: atepsa-rep-wppconnect
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:21465"
    volumes:
      - wppconnect-tokens:/home/user/wppconnect-server/tokens
      - wppconnect-userdata:/home/user/wppconnect-server/.wwebjs_auth
    environment:
      SERVER_SECRET_KEY: ${WPPCONNECT_SECRET_KEY}
      SERVER_WEBHOOK_URL: https://n8n.atepsa.org.ar/webhook/whatsapp-inbound
      SERVER_WEBHOOK_ALL_UNREAD_ON_START: "false"
      SERVER_WEBHOOK_AUTO_DOWNLOAD: "true"
      SERVER_LOG_LEVEL: error
      TZ: America/Argentina/Buenos_Aires
    networks:
      - atepsa-rep

  # ─── Orquestador de workflows ─────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.93.0
    container_name: atepsa-rep-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      N8N_HOST: n8n.atepsa.org.ar
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.atepsa.org.ar/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_EDITOR_BASE_URL: https://n8n.atepsa.org.ar/
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      TZ: America/Argentina/Buenos_Aires
    networks:
      - atepsa-rep
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Servicios que se agregan en fases siguientes ────────────────────────────
  # web / Next.js (Fase 2):  ports: ["127.0.0.1:3001:3000"]
  # transcriber / FastAPI (Fase 3): solo red interna, sin puerto al host

volumes:
  postgres-data:
  wppconnect-tokens:
  wppconnect-userdata:
  n8n-data:

networks:
  # Red interna aislada — no se conecta con los containers de otros proyectos
  atepsa-rep:
    name: atepsa-rep
    driver: bridge
