services:

  # ─── Base de datos (sin puerto expuesto al host — solo red interna Docker) ────
  postgres:
    image: postgres:16-alpine
    container_name: atepsa-rep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - atepsa-rep
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Orquestador de workflows ─────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.93.0
    container_name: atepsa-rep-n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      N8N_HOST: n8n.atepsa.org.ar
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.atepsa.org.ar/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_EDITOR_BASE_URL: https://n8n.atepsa.org.ar/
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      TZ: America/Argentina/Buenos_Aires
    networks:
      - atepsa-rep
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Panel web (Next.js) ─────────────────────────────────────────────────────
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: atepsa-rep-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - audio-data:/data/audio
      - documents-data:/data/documents
    networks:
      - atepsa-rep
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Transcriber FastAPI (Fase 3) ─────────────────────────────────────────
  transcriber:
    build:
      context: ../services/transcriber
      dockerfile: Dockerfile
    container_name: atepsa-rep-transcriber
    restart: unless-stopped
    environment:
      WHISPER_MODEL: medium
      WHISPER_COMPUTE_TYPE: int8
      MAX_CONCURRENT_JOBS: "2"
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - audio-data:/data/audio
      - documents-data:/data/documents
    networks:
      - atepsa-rep
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
  n8n-data:
  audio-data:
  documents-data:

networks:
  # Red interna aislada — no se conecta con los containers de otros proyectos
  atepsa-rep:
    name: atepsa-rep
    driver: bridge
