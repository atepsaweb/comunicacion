services:

  # ─── Base de datos (sin puerto expuesto al host — solo red interna Docker) ────
  postgres:
    image: postgres:16-alpine
    container_name: atepsa-rep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - atepsa-rep
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Servicios que se agregan en fases siguientes ────────────────────────────
  # Nota: todos los puertos se exponen solo en 127.0.0.1 para que el nginx
  # del host haga el proxy. Nunca exponer directamente al exterior.

  # evolution (Fase 1):
  #   ports: ["127.0.0.1:8081:8080"]
  #   networks: [atepsa-rep]

  # n8n (Fase 1):
  #   ports: ["127.0.0.1:5678:5678"]
  #   networks: [atepsa-rep]

  # web / Next.js (Fase 2):
  #   ports: ["127.0.0.1:3001:3000"]
  #   networks: [atepsa-rep]

  # transcriber / FastAPI (Fase 3):
  #   networks: [atepsa-rep]   # sin puerto al host, solo interno

volumes:
  postgres-data:

networks:
  # Red interna aislada — no se conecta con los containers de otros proyectos
  atepsa-rep:
    name: atepsa-rep
    driver: bridge
